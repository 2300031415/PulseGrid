global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'pulsegrid-backend'
    static_configs:
      - targets: ['backend:4000']
  - job_name: 'pulsegrid-frontend'
    static_configs:
      - targets: ['frontend:3000']
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
