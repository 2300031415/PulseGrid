name: PulseGrid CI/CD

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: pulsegrid-ui/package-lock.json
      - name: Install frontend dependencies
        run: cd pulsegrid-ui && npm install
      - name: Build frontend
        run: cd pulsegrid-ui && npm run build
      - name: Lint frontend
        run: cd pulsegrid-ui && npx eslint .
